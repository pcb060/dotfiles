backend = "glx"
shadow = false

active-opacity = 0.9
inactive-opacity = 0.8
inactive-dim = 0.15
detect-client-opacity = true;
opacity-rule = [
	"100:class_g = 'Brave-browser'",
	"100:class_g = 'albert'",
	"100:class_g = 'vlc'",
	"100:class_g ?= 'Godot'",
	"100:class_g ?= 'Aseprite'",
]

fading = false

blur-background = true
blur-method = "dual_kawase"
blur-strength = 10
blur-background-exclude = [
	"class_g = 'albert'"
]

